; PHP-FPM pool configuration for production
[www]
user  = appuser
group = appgroup

; Use Unix socket — more reliable than TCP in single-container setups
listen = /var/run/php-fpm.sock
listen.owner = root
listen.group = root
listen.mode  = 0660

; Process management
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests      = 500

; Logging
access.log           = /dev/null
php_admin_value[error_log]  = /dev/stderr
php_admin_flag[log_errors]  = on

; Pass all env vars to PHP
clear_env = no
