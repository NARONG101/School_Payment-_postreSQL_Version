; PHP-FPM pool configuration for production
[www]
user  = appuser
group = appgroup

; Listen on TCP (nginx connects to 127.0.0.1:9000)
listen = 127.0.0.1:9000

; Process management
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests      = 500

; Logging
access.log           = /dev/null
php_admin_value[error_log]  = /dev/stderr
php_admin_flag[log_errors]  = on

; Security — clear environment
clear_env = no
