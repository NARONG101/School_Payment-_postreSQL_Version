# ── Render deployment configuration ──────────────────────────
# Docs: https://render.com/docs/render-yaml-spec
#
# Deploy steps:
#   1. Push this repo to GitHub / GitLab
#   2. Connect the repo in Render dashboard
#   3. Render will detect this file automatically
#   4. Set the secret env vars in Render dashboard:
#        APP_KEY, ADMIN_EMAIL, ADMIN_PASSWORD
# ─────────────────────────────────────────────────────────────

databases:
  - name: student-payment-db
    databaseName: student_payment
    user: student_payment_user
    plan: free           # upgrade to 'starter' for production
    region: singapore

services:
  - type: web
    name: student-payment-system
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .

    plan: free          # change to 'starter' or higher for production
    region: singapore   # choose closest to your users
    healthCheckPath: /up

    # ── Environment variables ─────────────────────────────────
    envVars:
      - key: APP_NAME
        value: "CK Takhmao School"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false     # Set manually in Render dashboard — NEVER commit this

      - key: APP_URL
        value: https://student-payment-system.onrender.com   # update to your actual URL

      # PostgreSQL — pulled from the managed DB above
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: student-payment-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: student-payment-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: student-payment-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: student-payment-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: student-payment-db
          property: password
      - key: DB_SSLMODE
        value: require

      - key: SESSION_DRIVER
        value: file
      - key: SESSION_ENCRYPT
        value: "true"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_LIFETIME
        value: "120"

      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync

      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      - key: FILESYSTEM_DISK
        value: public

      - key: RENDER
        value: "true"

      - key: ADMIN_EMAIL
        sync: false     # Set in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false     # Set in Render dashboard
      - key: ADMIN_NAME
        value: "Admin User"

      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: "noreply@yourschool.edu"
      - key: MAIL_FROM_NAME
        value: "Student Payment System"
